<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1F3864">
<title>River States</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --brand: #1F3864;
  --brand-mid: #2E75B6;
  --brand-light: #D6E4F0;
  --green: #00c875;
  --orange: #fdab3d;
  --red: #df2f4a;
  --grey: #c4c4c4;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

.screen { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ── Setup ── */
#screen-setup { background: var(--brand); align-items: center; justify-content: center; padding: 32px 24px; }
.setup-logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 12px; border-radius: 12px; }
.setup-logo-fallback { font-size: 48px; margin-bottom: 12px; }
.setup-title { color: #fff; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 2px; }
.setup-brand { color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; margin-bottom: 24px; letter-spacing: 1px; text-transform: uppercase; }
.setup-version { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 6px; }
.setup-card { background: rgba(255,255,255,0.10); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; }
.setup-card label { color: rgba(255,255,255,0.8); font-size: 13px; display: block; margin-bottom: 8px; }
.setup-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: none; font-size: 15px; background: rgba(255,255,255,0.15); color: #fff; outline: none; }
.setup-input::placeholder { color: rgba(255,255,255,0.4); }
.setup-btn { width: 100%; margin-top: 14px; padding: 13px; border-radius: 10px; border: none; background: #fff; color: var(--brand); font-size: 15px; font-weight: 700; cursor: pointer; }

/* ── Roles ── */
#screen-roles { background: var(--brand); display: flex; flex-direction: column; }
.roles-header { padding: 52px 20px 20px; display: flex; align-items: center; gap: 14px; }
.roles-header-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; flex-shrink: 0; }
.roles-header-info h1 { color: #fff; font-size: 20px; font-weight: 800; }
.roles-header-info p  { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }
.roles-grid { flex: 1; overflow-y: auto; padding: 0 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.role-card { background: rgba(255,255,255,0.10); border-radius: var(--radius); padding: 20px 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; border: none; cursor: pointer; color: #fff; text-align: center; transition: background 0.15s; }
.role-card:active { background: rgba(255,255,255,0.20); }
.role-icon { font-size: 28px; }
.role-name { font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
.role-sub  { font-size: 11px; opacity: 0.6; }
.roles-footer { padding: 0 16px 32px; }
.roles-config-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; }

/* ── PIN ── */
#screen-pin { background: var(--brand); align-items: center; justify-content: center; padding: 32px 24px; }
.pin-title    { color: rgba(255,255,255,0.7); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.pin-role     { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 28px; }
.pin-dots     { display: flex; gap: 14px; margin-bottom: 28px; }
.pin-dot      { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.15s; }
.pin-dot.filled { background: #fff; }
.pin-dot.error  { background: var(--red); }
.pin-error    { color: var(--red); font-size: 13px; height: 18px; margin-bottom: 12px; }
.pin-numpad   { display: grid; grid-template-columns: repeat(3, 64px); gap: 12px; }
.pin-key      { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 22px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.pin-key:active { background: rgba(255,255,255,0.28); }
.pin-key.del  { font-size: 18px; }
.pin-back     { margin-top: 20px; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer; padding: 8px 16px; }

/* ── App Header ── */
.app-header { background: var(--brand); color: #fff; padding: 48px 16px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.app-header .back-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.app-header .header-logo { height: 48px; width: auto; max-width: 160px; object-fit: contain; border-radius: 8px; border: 2px solid #ffffff; padding: 4px 8px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
.app-header .header-info { flex: 1; }
.app-header h2 { font-size: 17px; font-weight: 700; }
.app-header .header-sub { font-size: 12px; opacity: 0.7; margin-top: 1px; }
.app-header .refresh-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Units ── */
#screen-units { display: flex; flex-direction: column; }
.units-search { padding: 10px 16px 6px; flex-shrink: 0; }
.units-search input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e5e7eb; background: #fff; font-size: 15px; outline: none; }
.units-stats { display: flex; gap: 8px; padding: 8px 16px; flex-shrink: 0; overflow-x: auto; }
.stat-chip { background: #fff; border-radius: 20px; padding: 6px 12px; display: flex; gap: 6px; align-items: center; white-space: nowrap; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
.stat-chip.chip-active { border-color: var(--brand-mid); }
.stat-n { font-size: 15px; font-weight: 700; }
.stat-l { font-size: 12px; color: var(--text-muted); }
.filter-bar { display: flex; gap: 8px; padding: 4px 16px 8px; flex-shrink: 0; }
.filter-pill { padding: 6px 14px; border-radius: 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.filter-pill.active   { background: var(--brand); color: #fff; }
.filter-pill.inactive { background: #e5e7eb; color: var(--text-muted); }
.units-list { flex: 1; overflow-y: auto; padding: 8px 16px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; align-content: start; }
.unit-btn { background: #fff; border: none; border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; box-shadow: var(--shadow); position: relative; }
.unit-btn.status-done     { background: #d1fae5; }
.unit-btn.status-progress { background: #fef3c7; }
.unit-btn.has-issue       { box-shadow: 0 0 0 2px var(--orange); }
.u-icon { font-size: 16px; }
.u-num  { font-size: 13px; font-weight: 700; }
.u-label { font-size: 9px; color: var(--text-muted); text-align: center; line-height: 1.2; }
.u-warn { position: absolute; top: 2px; right: 2px; font-size: 10px; }

/* ── Detail ── */
#screen-detail { display: flex; flex-direction: column; }
.detail-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.action-footer { padding: 12px 16px 32px; background: #fff; border-top: 1px solid #e5e7eb; display: flex; flex-direction: column; gap: 8px; }
.btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; color: #fff; }
.btn-action.taller      { background: #6c5ce7; }
.btn-action.inst-cocina { background: var(--brand-mid); }
.btn-action.inst-tope   { background: #00b894; }
.btn-action.encargado   { background: var(--green); }
.btn-action:disabled    { background: #c4c4c4; }
.btn-undo { width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid var(--red); background: #fff; color: var(--red); font-size: 14px; font-weight: 600; cursor: pointer; }

/* ── Detail Cards ── */
.detail-status-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.detail-status-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
.unit-label-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
.label-3br-izq { background: #ffadad; color: #7b0000; }
.label-4br-izq { background: #225091; color: #fff; }
.label-4br-der { background: #401694; color: #fff; }
.label-3br-der { background: #ff5ac4; color: #fff; }
.status-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
.status-row:last-child { border-bottom: none; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-dot.done     { background: var(--green); }
.status-dot.progress { background: var(--orange); }
.status-dot.pending  { background: var(--grey); }
.status-label { font-size: 13px; color: var(--text-muted); flex: 1; }
.status-val   { font-size: 13px; font-weight: 600; }

/* ── Photos ── */
.photos-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.photos-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
.photo-thumb.uploading { opacity: 0.5; }
.photo-thumb.upload-error { border: 2px solid var(--red); }
.photo-add { width: 100%; aspect-ratio: 1; border-radius: 8px; background: var(--brand-light); border: 2px dashed var(--brand-mid); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--brand-mid); cursor: pointer; }
.photo-loading { width: 100%; aspect-ratio: 1; border-radius: 8px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 20px; }

/* ── Issues ── */
.issue-card { background: #fff; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.issue-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
.issue-existing { background: #fff7ed; border: 1px solid var(--orange); border-radius: 8px; padding: 10px; font-size: 13px; margin-bottom: 10px; }
.issue-actions-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-issue-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-clear   { background: #fee2e2; color: var(--red); }
.btn-resolve { background: #d1fae5; color: #065f46; }
.issue-textarea { width: 100%; min-height: 80px; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px; font-size: 14px; font-family: inherit; resize: none; outline: none; }
.btn-issue { width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; background: var(--orange); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

/* ── Signature ── */
.sig-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.sig-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
.sig-card p  { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
.sig-done-banner { background: #d1fae5; color: #065f46; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 12px; }
.sig-done-banner span { display: block; font-size: 11px; font-weight: 400; opacity: 0.75; margin-top: 3px; }
.sig-done-banner img { display: block; max-width: 100%; border-radius: 6px; margin-top: 10px; background: #fff; }
.sig-activate-btn { width: 100%; background: var(--brand-light); border: 2px dashed var(--brand-mid); color: var(--brand); border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
.sig-activate-btn:active { opacity: 0.8; }
.sig-canvas-wrap { border: 2px solid var(--brand-mid); border-radius: 10px; overflow: hidden; background: #fafafa; display: none; }
#sig-canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
.sig-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-outline { flex: 1; background: #fff; border: 1.5px solid var(--brand-mid); color: var(--brand); border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
.btn-confirm-sig { flex: 2; background: var(--green); border: none; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; color: #fff; font-weight: 700; }

/* ── Photo Modal ── */
.photo-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999; }
.photo-modal.show { display: flex; }
.photo-modal img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
.photo-modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ── Toast & Loading ── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.82); color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; white-space: nowrap; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 998; max-width: 90vw; white-space: normal; text-align: center; }
.toast.show { opacity: 1; }
.loading { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 997; flex-direction: column; gap: 14px; }
.loading.show { display: flex; }
.loading-spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
.loading-text { color: #fff; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<!-- ── Setup ─────────────────────────────────────────────────── -->
<div id="screen-setup" class="screen active">
  <img src="logo.png" class="setup-logo" onerror="this.style.display='none';document.getElementById('setup-fallback').style.display='block'">
  <div id="setup-fallback" class="setup-logo-fallback" style="display:none">🏗️</div>
  <div class="setup-title">River States</div>
  <div class="setup-brand">Wood Studio</div>
  <div class="setup-version">v1</div>
  <div class="setup-card" style="margin-top:20px">
    <label>Token API de Monday.com</label>
    <input id="api-token-input" class="setup-input" type="password" placeholder="eyJhbGci..." autocomplete="off">
    <button class="setup-btn" onclick="saveToken()">Conectar</button>
    <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-top:10px;text-align:center">El token se guarda en este dispositivo.</p>
  </div>
</div>

<!-- ── Roles ─────────────────────────────────────────────────── -->
<div id="screen-roles" class="screen">
  <div class="roles-header">
    <img src="logo.png" class="roles-header-logo" onerror="this.style.display='none'">
    <div class="roles-header-info">
      <h1>River States</h1>
      <p>Wood Studio · Selecciona tu rol</p>
    </div>
  </div>
  <div class="roles-grid">
    <button class="role-card" onclick="goToPin('taller')">
      <span class="role-icon">📐</span>
      <span class="role-name">TALLER</span>
      <span class="role-sub">Medidas</span>
    </button>
    <button class="role-card" onclick="goToPin('instaladorCocina')">
      <span class="role-icon">🏠</span>
      <span class="role-name">INST. COCINAS</span>
      <span class="role-sub">Entrega Cocina</span>
    </button>
    <button class="role-card" onclick="goToPin('instaladorTope')">
      <span class="role-icon">🪨</span>
      <span class="role-name">INST. TOPES</span>
      <span class="role-sub">Countertops</span>
    </button>
    <button class="role-card" onclick="goToPin('encargado')">
      <span class="role-icon">✅</span>
      <span class="role-name">ENCARGADO</span>
      <span class="role-sub">Aprobación final</span>
    </button>
  </div>
  <div class="roles-footer">
    <button class="roles-config-btn" onclick="showSetup()">⚙️ Configuración</button>
  </div>
</div>

<!-- ── PIN ───────────────────────────────────────────────────── -->
<div id="screen-pin" class="screen">
  <div class="pin-title">Acceso</div>
  <div class="pin-role" id="pin-role-name">Taller</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-numpad">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key" onclick="pinKey('0')" style="grid-column:2">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <button class="pin-back" onclick="showRoles()">← Volver</button>
</div>

<!-- ── Units ─────────────────────────────────────────────────── -->
<div id="screen-units" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="showRoles()">←</button>
    <div class="header-info">
      <h2 id="units-header-title">Taller</h2>
      <div class="header-sub" id="units-header-sub">River States · 128 unidades</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadUnits()">↻</button>
    <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
  </div>
  <div class="units-search">
    <input type="text" id="search-input" placeholder="🔍  Buscar unidad..." oninput="filterUnits(this.value)">
  </div>
  <div class="units-stats">
    <div class="stat-chip" id="chip-done"     onclick="toggleChipFilter('done')"><span class="stat-n" id="stat-done">0</span><span class="stat-l">✅ Listas</span></div>
    <div class="stat-chip" id="chip-progress" onclick="toggleChipFilter('progress')"><span class="stat-n" id="stat-progress">0</span><span class="stat-l">⏳ En proceso</span></div>
    <div class="stat-chip" id="chip-pending"  onclick="toggleChipFilter('pending')"><span class="stat-n" id="stat-pending">0</span><span class="stat-l">⬜ Pendientes</span></div>
    <div class="stat-chip" id="chip-issues"   onclick="toggleChipFilter('issues')"><span class="stat-n" id="stat-issues" style="color:#fdab3d">0</span><span class="stat-l">⚠️ Problemas</span></div>
  </div>
  <div class="filter-bar">
    <button class="filter-pill active"   id="filter-all"         onclick="setFilter('all')">Todas</button>
    <button class="filter-pill inactive" id="filter-issues-pill" onclick="setFilter('issues')">⚠️ Problemas</button>
  </div>
  <div class="units-list" id="units-grid"></div>
</div>

<!-- ── Detail ─────────────────────────────────────────────────── -->
<div id="screen-detail" class="screen">
  <div class="app-header">
    <button class="back-btn" onclick="showUnits()">←</button>
    <div class="header-info">
      <h2 id="detail-title">Unidad 1</h2>
      <div class="header-sub" id="detail-role-label"></div>
    </div>
    <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="action-footer">
    <button class="btn-action" id="action-btn" onclick="handleAction()">Marcar como Lista</button>
    <button class="btn-undo"   id="undo-btn"   onclick="undoStatus()" style="display:none;">↩ Revertir a Pendiente</button>
  </div>
</div>

<!-- ── Photo Modal ───────────────────────────────────────────── -->
<div class="photo-modal" id="photo-modal" onclick="closePhotoModal()">
  <button class="photo-modal-close">✕</button>
  <img id="photo-modal-img" src="" alt="">
</div>

<!-- ── Toast & Loading ───────────────────────────────────────── -->
<div class="toast" id="toast"></div>
<div class="loading" id="loading">
  <div class="loading-spinner"></div>

<script>
// ── Config ───────────────────────────────────────────────────────
const BOARD_ID = 10019027783;
const API_URL  = 'https://api.monday.com/v2';
const FILE_URL = '/monday-file';

// PINs — cambia aquí para modificar los códigos
const PINS = {
  taller:           '1111',
  instaladorCocina: '2222',
  instaladorTope:   '3333',
  encargado:        '4444',
};

const COL = {
  medidas:           'color_mkvna34b',    // Rectificar Medidas (Taller)
  entregaCocina:     'status',            // Entrega Cocina (Inst. Cocinas)
  instalacionTope:   'color_mkvn9ykp',    // Instalacion Tope (Inst. Topes)
  inspeccionCliente: 'color_mkvnec2y',    // Insp. Cliente (Encargado)
  fechaEntrega:      'date4',
  fechaMedidas:      'date_mkvngwbq',
  fechaTopes:        'date_mkvnn92k',
  problemas:         'long_text_mkvnsrm6',// Arreglos Contratista
  label:             'color_mkvnyjbj',    // Tipo unidad (3BR/4BR Izq/Der)
};

const ROLES = {
  taller:           { name: 'Taller',        col: COL.medidas,           cls: 'taller',      photos: false, sig: false, sigRequired: false, issues: true,  doneLabel: 'Terminado', dateCol: COL.fechaMedidas, action: 'Marcar Medidas Realizadas ✔' },
  instaladorCocina: { name: 'Inst. Cocinas', col: COL.entregaCocina,     cls: 'inst-cocina', photos: true,  sig: true,  sigRequired: false, issues: true,  doneLabel: 'Terminado', dateCol: COL.fechaEntrega, action: 'Marcar Cocina Entregada ✔' },
  instaladorTope:   { name: 'Inst. Topes',   col: COL.instalacionTope,   cls: 'inst-tope',   photos: true,  sig: true,  sigRequired: false, issues: true,  doneLabel: 'Terminado', dateCol: COL.fechaTopes,   action: 'Marcar Topes Instalados ✔' },
  encargado:        { name: 'Encargado',     col: COL.inspeccionCliente, cls: 'encargado',   photos: false, sig: true,  sigRequired: true,  issues: false, doneLabel: 'Satisfecho', dateCol: null,            action: 'Firmar y Aprobar ✔' },
};

const S = {
  token: null, role: null, units: [], current: null,
  sigDrawn: false, sigConfirmed: false, sigActive: false,
  filter: 'all', pinBuffer: '', pinTargetRole: null,
};

window.addEventListener('load', () => {
  S.token = localStorage.getItem('rs_token');
  showScreen(S.token ? 'roles' : 'setup');
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function showSetup()  { showScreen('setup'); }
function showRoles()  { showScreen('roles'); }
function showUnits()  { showScreen('units'); }

function saveToken() {
  const t = document.getElementById('api-token-input').value.trim();
  if (!t) { toast('Ingresa un token válido'); return; }
  S.token = t;
  localStorage.setItem('rs_token', t);
  showScreen('roles');
}

// ── PIN System ───────────────────────────────────────────────────
function goToPin(roleId) {
  S.pinTargetRole = roleId;
  S.pinBuffer = '';
  document.getElementById('pin-role-name').textContent = ROLES[roleId].name;
  document.getElementById('pin-error').textContent = '';
  updatePinDots(false);
  showScreen('pin');
}

function pinKey(digit) {
  if (S.pinBuffer.length >= 4) return;
  S.pinBuffer += digit;
  updatePinDots(false);
  if (S.pinBuffer.length === 4) setTimeout(verifyPin, 120);
}

function pinDel() {
  S.pinBuffer = S.pinBuffer.slice(0, -1);
  updatePinDots(false);
  document.getElementById('pin-error').textContent = '';
}

function updatePinDots(error) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'pin-dot';
    if (error)                       dot.classList.add('error');
    else if (i < S.pinBuffer.length) dot.classList.add('filled');
  }
}

function verifyPin() {
  if (S.pinBuffer === PINS[S.pinTargetRole]) {
    document.getElementById('pin-error').textContent = '';
    selectRole(S.pinTargetRole);
  } else {
    updatePinDots(true);
    document.getElementById('pin-error').textContent = 'Código incorrecto';
    setTimeout(() => {
      S.pinBuffer = '';
      updatePinDots(false);
      document.getElementById('pin-error').textContent = '';
    }, 1200);
  }
}

// ── Monday API ───────────────────────────────────────────────────
async function gql(query, variables = {}) {
  const res  = await fetch(API_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': S.token, 'API-Version': '2024-01' },
    body:    JSON.stringify({ query, variables })
  });
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function loadAllItems() {
  let allItems = [], cursor = null;
  do {
    const q = cursor
      ? `query($bid:ID!,$cur:String!){ boards(ids:[$bid]){ items_page(limit:200,cursor:$cur){ cursor items{ id name column_values{ id text value } } } } }`
      : `query($bid:ID!){ boards(ids:[$bid]){ items_page(limit:200){ cursor items{ id name column_values{ id text value } } } } }`;
    const vars = cursor ? { bid: String(BOARD_ID), cur: cursor } : { bid: String(BOARD_ID) };
    const d = await gql(q, vars);
    const page = d.boards[0].items_page;
    allItems = allItems.concat(page.items);
    cursor = page.cursor || null;
  } while (cursor);
  return allItems;
}

async function mutateColumn(itemId, colId, val) {
  const q = `mutation($bid:ID!,$iid:ID!,$cid:String!,$val:JSON!){ change_column_value(board_id:$bid,item_id:$iid,column_id:$cid,value:$val){ id } }`;
  await gql(q, { bid: String(BOARD_ID), iid: String(itemId), cid: colId, val: JSON.stringify(val) });
}

async function createUpdate(itemId, body) {
  const q = `mutation($iid:ID!,$body:String!){ create_update(item_id:$iid,body:$body){ id } }`;
  const d = await gql(q, { iid: String(itemId), body });
  return d.create_update.id;
}

async function uploadFileToUpdate(updateId, blob, filename) {
  const fd = new FormData();
  fd.append('query', `mutation add($file:File!){ add_file_to_update(update_id:${updateId}, file:$file){ id } }`);
  fd.append('variables', JSON.stringify({ file: null }));
  fd.append('map', JSON.stringify({ '0': ['variables.file'] }));
  fd.append('0', blob, filename);
  const res = await fetch(FILE_URL, {
    method: 'POST',
    headers: { 'Authorization': S.token },
    body: fd
  });
  if (!res.ok) {
    let detail = '';
    try { const t = await res.text(); detail = ' — ' + t.slice(0, 200); } catch(_) {}
    throw new Error(`HTTP ${res.status}${detail}`);
  }
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message || 'Error Monday');
  return json;
}

async function fileToJpeg(file) {
  return new Promise(resolve => {
    const img = new Image();
    const objUrl = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1400;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(objUrl);
      canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', 0.82);
    };
    img.onerror = () => { URL.revokeObjectURL(objUrl); resolve(file); };
    img.src = objUrl;
  });
}

async function fetchAsBlob(url) {
  try {
    const res = await fetch(url, { headers: { Authorization: S.token } });
    if (!res.ok) return null;
    return URL.createObjectURL(await res.blob());
  } catch(e) { return null; }
}

// ── Helpers ──────────────────────────────────────────────────────
function getColStatus(unit, colId) {
  const cv = unit.column_values.find(c => c.id === colId);
  if (!cv || !cv.text) return 'pending';
  const t = cv.text.toLowerCase();
  if (['terminado', 'satisfecho', 'done'].includes(t)) return 'done';
  if (['sin comenzar', 'sin realizar', 'a realizar', 'a comenzar', 'sin empezar'].includes(t)) return 'pending';
  return 'progress';
}
function getColText(unit, colId) { const cv = unit.column_values.find(c => c.id === colId); return cv?.text || ''; }
function hasIssue(unit) { return !!getColText(unit, COL.problemas).trim(); }
function statusIcon(s)  { return s==='done'?'✅':s==='progress'?'⏳':'⬜'; }
function statusLabel(s) { return s==='done'?'Completado':s==='progress'?'En proceso':'Pendiente'; }

function getUnitLabel(unit) {
  const t = getColText(unit, COL.label);
  if (!t) return null;
  const tl = t.toLowerCase();
  if (tl.includes('3') && tl.includes('izq')) return { text: t, cls: 'label-3br-izq' };
  if (tl.includes('4') && tl.includes('izq')) return { text: t, cls: 'label-4br-izq' };
  if (tl.includes('4') && tl.includes('der')) return { text: t, cls: 'label-4br-der' };
  if (tl.includes('3') && tl.includes('der')) return { text: t, cls: 'label-3br-der' };
  return { text: t, cls: '' };
}

async function refreshAll() {
  const items = await loadAllItems();
  S.units = items.sort((a,b) => (parseInt(a.name.replace(/\D/g,''))||0)-(parseInt(b.name.replace(/\D/g,''))||0));
  if (S.current) S.current = S.units.find(u => u.id === S.current.id) || S.current;
}

// ── Units Screen ─────────────────────────────────────────────────
async function selectRole(roleId) {
  S.role = roleId; S.filter = 'all';
  const r = ROLES[roleId];
  document.getElementById('units-header-title').textContent = r.name;
  document.getElementById('units-header-sub').textContent   = 'River States · 128 unidades';
  showScreen('units');
  await loadUnits();
}

async function loadUnits() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  showLoading('Cargando unidades...');
  try { await refreshAll(); renderUnits(S.units); }
  catch(e) { toast('Error: ' + e.message); }
  finally { hideLoading(); btn.classList.remove('spinning'); }
}

function toggleChipFilter(f) { setFilter(S.filter === f ? 'all' : f); }

function setFilter(f) {
  S.filter = f;
  document.getElementById('filter-all').className         = 'filter-pill ' + (f==='all'    ? 'active':'inactive');
  document.getElementById('filter-issues-pill').className = 'filter-pill ' + (f==='issues' ? 'active':'inactive');
  ['done','progress','pending','issues'].forEach(k => {
    document.getElementById('chip-'+k)?.classList.toggle('chip-active', f===k);
  });
  renderUnits(S.units);
}

function renderUnits(units) {
  const col = ROLES[S.role].col;
  let done=0, prog=0, pend=0, issueCount=0;
  units.forEach(u => {
    const st = getColStatus(u, col);
    if (st==='done') done++; else if (st==='progress') prog++; else pend++;
    if (hasIssue(u)) issueCount++;
  });
  let visible = units;
  if      (S.filter==='done')     visible = units.filter(u => getColStatus(u,col)==='done');
  else if (S.filter==='progress') visible = units.filter(u => getColStatus(u,col)==='progress');
  else if (S.filter==='pending')  visible = units.filter(u => getColStatus(u,col)==='pending');
  else if (S.filter==='issues')   visible = units.filter(u => hasIssue(u));

  document.getElementById('units-grid').innerHTML = visible.map(u => {
    const st = getColStatus(u,col), warn = hasIssue(u);
    const lbl = getUnitLabel(u);
    const shortLabel = lbl ? lbl.text.replace('BR - ','').replace('BR -','') : '';
    return `<button class="unit-btn status-${st}${warn?' has-issue':''}" onclick="openUnit('${u.id}')">
      <span class="u-icon">${statusIcon(st)}</span>
      <span class="u-num">${u.name.replace(/\D/g,'') || u.name}</span>
      ${shortLabel ? `<span class="u-label">${shortLabel}</span>` : ''}
      ${warn?'<span class="u-warn">⚠️</span>':''}
    </button>`;
  }).join('');

  document.getElementById('stat-done').textContent     = done;
  document.getElementById('stat-progress').textContent = prog;
  document.getElementById('stat-pending').textContent  = pend;
  document.getElementById('stat-issues').textContent   = issueCount;
}

function filterUnits(q) {
  renderUnits(q ? S.units.filter(u => u.name.toLowerCase().includes(q.toLowerCase())) : S.units);
}

// ── Detail Screen ────────────────────────────────────────────────
function openUnit(itemId) {
  S.current      = S.units.find(u => u.id === itemId);
  S.sigDrawn     = false;
  S.sigConfirmed = false;
  S.sigActive    = false;
  if (!S.current) return;
  const r = ROLES[S.role];

  document.getElementById('detail-title').textContent      = S.current.name;
  document.getElementById('detail-role-label').textContent = r.name;

  const actionBtn = document.getElementById('action-btn');
  const undoBtn   = document.getElementById('undo-btn');
  actionBtn.className   = `btn-action ${r.cls}`;
  actionBtn.textContent = r.action;
  const st = getColStatus(S.current, r.col);
  if (st === 'done') {
    actionBtn.disabled = true; actionBtn.textContent = '✅ Ya Completado';
    undoBtn.style.display = 'block';
  } else {
    actionBtn.disabled = false;
    undoBtn.style.display = 'none';
  }

  renderDetail();
  showScreen('detail');
  if (r.photos) loadLocalPhotos(itemId);
  if (r.photos || r.sig) loadDetailMedia(itemId);
}

function renderDetail() {
  const r = ROLES[S.role], u = S.current;
  const lbl = getUnitLabel(u);
  let html = `<div class="detail-status-card"><h3>Estado General</h3>
    ${lbl ? `<span class="unit-label-badge ${lbl.cls}">${lbl.text}</span>` : ''}
    ${row('Rectificar Medidas', getColStatus(u,COL.medidas),           getColText(u,COL.medidas)           || statusLabel(getColStatus(u,COL.medidas)))}
    ${row('Entrega Cocina',     getColStatus(u,COL.entregaCocina),     getColText(u,COL.entregaCocina)     || statusLabel(getColStatus(u,COL.entregaCocina)))}
    ${row('Instalación Tope',   getColStatus(u,COL.instalacionTope),   getColText(u,COL.instalacionTope)   || statusLabel(getColStatus(u,COL.instalacionTope)))}
    ${row('Insp. Cliente',      getColStatus(u,COL.inspeccionCliente), getColText(u,COL.inspeccionCliente) || statusLabel(getColStatus(u,COL.inspeccionCliente)))}
  </div>`;

  if (r.photos) html += `<div class="photos-card">
    <h3>📷 Fotos del Trabajo</h3>
    <div class="photo-grid" id="photo-grid">
      <div class="photo-loading" id="photos-loading">⏳</div>
      <div class="photo-add" onclick="document.getElementById('camera-input').click()">+</div>
    </div></div>`;

  if (r.issues) {
    const existing = getColText(u, COL.problemas);
    html += `<div class="issue-card"><h3>⚠️ Reportar Daño / Faltante</h3>
      ${existing ? `<div class="issue-existing"><strong>Problema reportado:</strong> ${existing}</div>
        <div class="issue-actions-row">
          <button class="btn-issue-sm btn-clear" onclick="clearIssue()">🗑️ Borrar</button>
          <button class="btn-issue-sm btn-resolve" onclick="resolveIssue()">✅ Resuelto</button>
        </div>` : ''}
      <textarea class="issue-textarea" id="issue-textarea" placeholder="Ej: Se rompió una puerta, falta una pata..."></textarea>
      <button class="btn-issue" onclick="reportIssue()">📤 Reportar Problema</button>
    </div>`;
  }

  if (r.sig) {
    const sigTitle = r.sigRequired ? '✍️ Firma de Aprobación' : '✍️ Firma (opcional)';
    const sigSub   = r.sigRequired ? 'Presiona el botón para activar la firma.' : 'Firma para certificar que el trabajo está terminado.';
    html += `<div class="sig-card" id="sig-card">
      <h3>${sigTitle}</h3>
      <p>${sigSub}</p>
      <div id="sig-status"></div>
      <button id="sig-activate-btn" class="sig-activate-btn" onclick="activateSignature()">✍️ Activar Firma</button>
      <div id="sig-canvas-wrap" class="sig-canvas-wrap"><canvas id="sig-canvas" height="160"></canvas></div>
      <div class="sig-actions" id="sig-actions" style="display:none;">
        <button class="btn-outline" onclick="clearSignature()">Limpiar</button>
        <button class="btn-confirm-sig" onclick="confirmSignature()">✅ Confirmar Firma</button>
      </div>
    </div>`;
    setTimeout(initSignatureCanvas, 50);
  }

  document.getElementById('detail-body').innerHTML = html;
}

function row(label, status, text) {
  return `<div class="status-row"><div class="status-dot ${status}"></div>
    <span class="status-label">${label}</span><span class="status-val">${text}</span></div>`;
}

// ── Load media from Monday ────────────────────────────────────────
async function loadDetailMedia(itemId) {
  try {
    const q = `query($id:ID!){ items(ids:[$id]){ updates(limit:100){ id body assets{ id name url public_url file_extension } } } }`;
    const d = await gql(q, { id: String(itemId) });
    const updates = d.items?.[0]?.updates || [];

    const grid = document.getElementById('photo-grid');
    document.getElementById('photos-loading')?.remove();
    if (grid) {
      const imgExts = new Set(['jpg','jpeg','png','gif','webp','heic','heif']);
      const photoAssets = [];
      updates.filter(u => u.body?.includes('📷')).forEach(upd =>
        upd.assets.filter(a => imgExts.has((a.file_extension||'').toLowerCase())).forEach(a => photoAssets.push(a))
      );
      for (const asset of photoAssets) {
        const img = document.createElement('img');
        img.className = 'photo-thumb uploading';
        grid.insertBefore(img, grid.lastElementChild);
        const src = asset.public_url || await fetchAsBlob(asset.url);
        if (src) {
          img.src = src; img.classList.remove('uploading');
          img.onclick = () => openPhotoModal(src);
          img.onerror = () => fetchAsBlob(asset.url).then(b => b ? (img.src=b, img.onclick=()=>openPhotoModal(b)) : img.remove());
        } else { img.remove(); }
      }
    }

    const sigStatus = document.getElementById('sig-status');
    if (sigStatus) {
      const sigUpd = updates.find(u => u.body?.includes('✍️'));
      if (sigUpd) {
        const match = sigUpd.body.match(/✍️\s(.+?)\s—\sFirma.+\((.+)\)/);
        const who  = match?.[1] || 'Encargado';
        const when = match?.[2] || '';
        const sigAsset = sigUpd.assets?.find(a => (a.file_extension||'').toLowerCase() === 'png');
        let sigImgHtml = '';
        if (sigAsset) {
          const sigSrc = sigAsset.public_url || await fetchAsBlob(sigAsset.url);
          if (sigSrc) sigImgHtml = `<img src="${sigSrc}" alt="Firma">`;
        }
        sigStatus.innerHTML = `<div class="sig-done-banner">✅ Firmado por ${who}${when?`<span>${when}</span>`:''}${sigImgHtml}</div>`;
        document.getElementById('sig-activate-btn')?.style && (document.getElementById('sig-activate-btn').style.display = 'none');
        document.getElementById('sig-canvas-wrap').style.display  = 'none';
        document.getElementById('sig-actions').style.display      = 'none';
        S.sigConfirmed = true;
      }
    }
  } catch(e) {
    document.getElementById('photos-loading')?.remove();
    console.warn('loadDetailMedia:', e.message);
  }
}

// ── Signature ────────────────────────────────────────────────────
let sigCtx = null, sigDrawing = false;

function initSignatureCanvas() {
  const canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth || 300;
  sigCtx = canvas.getContext('2d');
  Object.assign(sigCtx, { strokeStyle: '#1F3864', lineWidth: 2.5, lineCap: 'round', lineJoin: 'round' });
  const pos = e => {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  };
  canvas.addEventListener('mousedown',  e => { if (!S.sigActive) return; sigDrawing=true; const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); });
  canvas.addEventListener('mousemove',  e => { if (!sigDrawing || !S.sigActive) return; const p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); S.sigDrawn=true; });
  canvas.addEventListener('mouseup',    () => sigDrawing=false);
  canvas.addEventListener('touchstart', e => { if (!S.sigActive) return; e.preventDefault(); sigDrawing=true; const p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove',  e => { if (!sigDrawing || !S.sigActive) return; e.preventDefault(); const p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); S.sigDrawn=true; }, {passive:false});
  canvas.addEventListener('touchend',   () => sigDrawing=false);
}

function activateSignature() {
  if (S.sigConfirmed) return;
  S.sigActive = true;
  document.getElementById('sig-activate-btn').style.display = 'none';
  document.getElementById('sig-canvas-wrap').style.display  = 'block';
  document.getElementById('sig-actions').style.display      = 'flex';
  const canvas = document.getElementById('sig-canvas');
  if (canvas && sigCtx) { canvas.width = canvas.offsetWidth || 300; }
  toast('Dibuja tu firma');
}

function clearSignature() {
  if (!sigCtx || S.sigConfirmed) return;
  const c = document.getElementById('sig-canvas');
  sigCtx.clearRect(0, 0, c.width, c.height);
  S.sigDrawn = false;
}

async function confirmSignature() {
  if (!S.sigDrawn) { toast('Dibuja tu firma primero'); return; }
  if (S.sigConfirmed) return;
  const u = S.current, r = ROLES[S.role];
  const today = new Date().toISOString().split('T')[0];
  showLoading('Guardando firma...');
  try {
    const blob = await getSignatureBlob();
    const uid  = await createUpdate(u.id, `✍️ ${r.name} — Firma de aprobación ${u.name} (${today})`);
    await uploadFileToUpdate(uid, blob, `firma_${u.name.replace(/ /g,'_')}_${today}.png`);
    S.sigConfirmed = true;
    S.sigActive    = false;
    document.getElementById('sig-canvas-wrap').style.pointerEvents = 'none';
    document.getElementById('sig-canvas-wrap').style.opacity = '0.7';
    document.getElementById('sig-actions').innerHTML =
      `<div style="color:var(--green);font-weight:700;font-size:14px;padding:8px 0;">✅ Firma confirmada y guardada en Monday</div>`;
    hideLoading();
    toast('✅ Firma guardada en Monday');
  } catch(e) {
    hideLoading();
    toast('❌ Error guardando firma: ' + e.message);
  }
}

function getSignatureBlob() {
  return new Promise(res => document.getElementById('sig-canvas').toBlob(res, 'image/png'));
}

// ── IndexedDB — fotos locales ────────────────────────────────────
async function dbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('rs-photos', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbSavePhoto(unitId, dataUrl) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').add({ unitId, dataUrl, ts: Date.now() });
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}
async function dbLoadPhotos(unitId) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('photos', 'readonly').objectStore('photos').getAll();
    req.onsuccess = () => res(req.result.filter(p => p.unitId === unitId));
    req.onerror   = e => rej(e.target.error);
  });
}

// ── Photos ───────────────────────────────────────────────────────
async function handlePhotos(event) {
  const files = Array.from(event.target.files);
  event.target.value = '';
  if (!files.length || !S.current) return;
  const u = S.current, r = ROLES[S.role];
  const grid = document.getElementById('photo-grid');
  if (!grid) return;

  for (const file of files) {
    const previewUrl = URL.createObjectURL(file);
    const img = document.createElement('img');
    img.src = previewUrl; img.className = 'photo-thumb uploading';
    grid.insertBefore(img, grid.lastElementChild);
    toast('⏳ Guardando foto...');
    try {
      const jpeg = await fileToJpeg(file);
      const dataUrl = await blobToDataUrl(jpeg);
      await dbSavePhoto(u.id, dataUrl);
      img.classList.remove('uploading');
      img.onclick = () => openPhotoModal(previewUrl);
      toast('✅ Foto guardada en el dispositivo');
      const today = new Date().toISOString().split('T')[0];
      const fname = `foto_${u.name.replace(/ /g,'_')}_${Date.now()}.jpg`;
      createUpdate(u.id, `📷 ${r.name} — Foto de instalación ${u.name} (${today})`)
        .then(uid => uploadFileToUpdate(uid, jpeg, fname))
        .then(() => toast('☁️ Foto también sincronizada con Monday'))
        .catch(e => console.warn('Monday upload failed (foto guardada local):', e.message));
    } catch(e) {
      img.classList.replace('uploading', 'upload-error');
      toast('❌ Error: ' + e.message);
    }
  }
}

function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload  = () => res(reader.result);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

async function loadLocalPhotos(unitId) {
  try {
    const photos = await dbLoadPhotos(unitId);
    const grid = document.getElementById('photo-grid');
    if (!grid || !photos.length) return;
    photos.forEach(p => {
      const img = document.createElement('img');
      img.src = p.dataUrl; img.className = 'photo-thumb';
      img.onclick = () => openPhotoModal(p.dataUrl);
      grid.insertBefore(img, grid.lastElementChild);
    });
  } catch(e) { console.warn('loadLocalPhotos:', e); }
}

function openPhotoModal(src)  { document.getElementById('photo-modal-img').src=src; document.getElementById('photo-modal').classList.add('show'); }
function closePhotoModal()    { document.getElementById('photo-modal').classList.remove('show'); }

// ── Issues ───────────────────────────────────────────────────────
async function reportIssue() {
  const text = document.getElementById('issue-textarea')?.value.trim();
  if (!text) { toast('Escribe el problema antes de reportar'); return; }
  const u = S.current, r = ROLES[S.role];
  const now = new Date();
  const ds = now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const ts = now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  showLoading('Reportando...');
  try {
    await mutateColumn(u.id, COL.problemas, { text: `${r.name} (${ds} ${ts}): ${text}` });
    await createUpdate(u.id, `⚠️ PROBLEMA — ${u.name}\nPor: ${r.name} · ${ds} ${ts}\n\n${text}`);
    await refreshAll(); hideLoading(); toast('Problema reportado ⚠️'); renderDetail(); renderUnits(S.units);
  } catch(e) { hideLoading(); toast('Error: '+e.message); }
}

async function clearIssue() {
  showLoading('Borrando...');
  try {
    await mutateColumn(S.current.id, COL.problemas, { text: '' });
    await refreshAll(); hideLoading(); toast('Borrado'); renderDetail(); renderUnits(S.units);
  } catch(e) { hideLoading(); toast('Error: '+e.message); }
}

async function resolveIssue() {
  const u = S.current, r = ROLES[S.role];
  const ds = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  showLoading('Marcando resuelto...');
  try {
    await mutateColumn(u.id, COL.problemas, { text: '' });
    await createUpdate(u.id, `✅ RESUELTO — ${u.name}\nPor: ${r.name} · ${ds}`);
    await refreshAll(); hideLoading(); toast('Resuelto ✅'); renderDetail(); renderUnits(S.units);
  } catch(e) { hideLoading(); toast('Error: '+e.message); }
}

// ── Undo ─────────────────────────────────────────────────────────
async function undoStatus() {
  const u = S.current, r = ROLES[S.role];
  showLoading('Revirtiendo...');
  try {
    await mutateColumn(u.id, r.col, {});
    await refreshAll(); hideLoading(); toast(`${u.name} revertida a pendiente`);
    const ab = document.getElementById('action-btn');
    ab.disabled = false; ab.textContent = r.action; ab.className = `btn-action ${r.cls}`;
    document.getElementById('undo-btn').style.display = 'none';
    renderDetail(); renderUnits(S.units);
  } catch(e) { hideLoading(); toast('Error: '+e.message); }
}

// ── Main Action ───────────────────────────────────────────────────
async function handleAction() {
  const r = ROLES[S.role], u = S.current;
  if (r.sig && r.sigRequired && !S.sigConfirmed) { toast('Confirma tu firma primero'); return; }
  showLoading('Guardando...');
  try {
    const today = new Date().toISOString().split('T')[0];
    await mutateColumn(u.id, r.col, { label: r.doneLabel });
    if (r.dateCol) await mutateColumn(u.id, r.dateCol, { date: today });
    await refreshAll(); hideLoading(); toast(`${u.name} completada ✅`);
    const ab = document.getElementById('action-btn');
    ab.disabled = true; ab.textContent = '✅ Ya Completado';
    document.getElementById('undo-btn').style.display = 'block';
    renderDetail(); renderUnits(S.units);
  } catch(e) { hideLoading(); toast('Error: '+e.message); }
}

// ── UI Helpers ────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 5000);
}
function showLoading(msg='Cargando...') { document.getElementById('loading-text').textContent=msg; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
</script>
